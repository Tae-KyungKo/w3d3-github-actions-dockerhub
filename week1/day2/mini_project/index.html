<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toss 스타일 DevOps 엔터프라이즈 사전</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav class="nav-bar">
            <div class="logo">DevOps.<span>Pro</span></div>
            <div class="nav-right">
                <button id="themeToggle" class="theme-btn">🌙 모드 변경</button>
            </div>
        </nav>

        <header class="header">
            <h1>DevOps 기술 아카이브</h1>
            <p>시니어 엔지니어링의 실무 개념과 아키텍처 핵심을 미니멀 디자인으로 탐색하세요.</p>
            
            <div class="dashboard">
                <div class="progress-info">
                    <span>학습 진척도</span>
                    <span id="progressPercent">0% (0/9 카드)</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="stats-row">
                    <div class="stat-item">북마크한 카드: <span id="bookmarkCount">0</span>개</div>
                </div>
            </div>
        </header>

        <section class="control-panel">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="용어, 비유, 명령어, 태그 실시간 검색..." autocomplete="off">
            </div>
            <div class="filter-tabs" id="filterTabs">
                <button class="tab-btn active" data-filter="all">전체</button>
                <button class="tab-btn" data-filter="container">컨테이너/오케스트레이션</button>
                <button class="tab-btn" data-filter="cicd">CI/CD & 배포</button>
                <button class="tab-btn" data-filter="monitor">모니터링/네트워크</button>
                <button class="tab-btn" data-filter="bookmark">★ 북마크 보관함</button>
            </div>
        </section>

        <main class="card-grid" id="cardGrid"></main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div class="modal-body" id="modalBody">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
