<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Tier 아키텍처 연습</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 40px; background-color: #f5f6f7; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h1 { color: #333; font-size: 24px; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        .data-item { margin: 15px 0; font-size: 16px; color: #555; }
        .strong-label { font-weight: bold; color: #111; display: inline-block; width: 120px; }
        .badge { background-color: #e8f5e9; color: #2e7d32; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .error { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>3-Tier 인프라 통신 검증 화면</h1>
    <div id="content-area">
        <p>백엔드 스프링 부트 서버로부터 데이터를 불러오는 중...</p>
    </div>
</div>

<script>
    // [아키텍처 매커니즘 핵심 가이드]
    // 질문자님의 docker-compose.yml 설정을 보면, gateway(Nginx)가 외부 "8080" 포트를 열고 트래픽을 받습니다.
    // 브라우저를 켜서 테스트하는 주체는 '도커 컨테이너 내부'가 아니라 질문자님의 '로컬 PC(호스트)'입니다.
    // 따라서 자바스크립트가 데이터를 찌를 주소는 'http://backend:8080'이 아니라, 내 컴퓨터 기준인 'http://localhost:8080'이 되어야 합니다.
    // (단, 추후 Nginx 리버스 프록시 설정을 추가한다면 포트 생략 후 그냥 '/api/hello' 상대경로로 통일하는 것이 실무 표준입니다.)

    const BACKEND_URL = 'http://localhost:8080/api/hello';

    // 페이지 로드 시 백엔드 API 호출 실행
    document.addEventListener("DOMContentLoaded", function() {
        fetch(BACKEND_URL)
            .then(response => {
                if (!response.ok) {
                    throw new Error("네트워크 응답에 문제가 발생했습니다.");
                }
                return response.json(); // 백엔드가 던진 Map 데이터를 자바스크립트 객체(JSON)로 파싱
            })
            .then(data => {
                // 성공 시 화면에 백엔드가 보낸 데이터를 동적으로 바인딩 (CSR 방식)
                const contentArea = document.getElementById("content-area");
                contentArea.innerHTML = `
                        <div class="data-item"><span class="strong-label">상태:</span> <span class="badge">${data.status}</span></div>
                        <div class="data-item"><span class="strong-label">메시지:</span> ${data.message}</div>
                        <div class="data-item"><span class="strong-label">아키텍처망:</span> <code>${data.architecture}</code></div>
                        <div class="data-item"><span class="strong-label">서버 타임스탬프:</span> ${data.serverTime}</div>
                    `;
            })
            .catch(error => {
                // 서버가 꺼져있거나 포트가 막혔을 때 에러 처리
                console.error("API 호출 실패:", error);
                const contentArea = document.getElementById("content-area");
                contentArea.innerHTML = `
                        <p class="error">백엔드 WAS 컨테이너와 통신에 실패했습니다.</p>
                        <p style="font-size: 13px; color: #777;">이유: 8080 포트 포워딩이 제대로 맞물리지 않았거나 백엔드가 가동 중이 아닙니다.</p>
                    `;
            });
    });
</script>
</body>
</html>
