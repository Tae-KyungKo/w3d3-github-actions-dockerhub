services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    container_name: my-practice-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - public_net
      - app_net
    depends_on:
      - backend

  backend:
    build: .
    container_name: my-practice-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database-db:5432/${POSTGRES_DB:-mydb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    networks:
      - app_net
      - data_net
    depends_on:
      - db


  db:
    image: postgres:16-alpine
    container_name: my-practice-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - data_net
volumes:
  pgdata:

networks:
  public_net:
  data_net:
  app_net: